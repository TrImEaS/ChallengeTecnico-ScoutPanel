version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: ldp_scout_db
    restart: always
    environment:
      - POSTGRES_USER=thomas_admin
      - POSTGRES_PASSWORD=eñie_2026!#
      - POSTGRES_DB=scout_panel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thomas_admin -d scout_panel"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ldp_scout_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://thomas_admin:e%C3%B1ie_2026%21%23@db:5432/scout_panel
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && npx prisma db seed && npm run test -- --watchAll=false && npm run start:prod"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL_PROD=https://trimeas.duckdns.org/api
    container_name: ldp_scout_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npx serve -s build/client -l 5173"

volumes:
  postgres_data:
